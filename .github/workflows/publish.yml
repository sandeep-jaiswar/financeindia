# This file is aligned with CI.yml for consistent builds and releases.
# It uses Zig for consistent cross-compilation across all Linux targets.

name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux:
    runs-on: ${{ matrix.platform.runner }}
    env:
      # Ring crate assembly support for ARM
      CFLAGS_aarch64_unknown_linux_gnu: "-D__ARM_ARCH=8"
      CFLAGS_aarch64_unknown_linux_musl: "-D__ARM_ARCH=8"
      CFLAGS_armv7_unknown_linux_gnueabihf: "-D__ARM_ARCH=7"
      CFLAGS_armv7_unknown_linux_musleabihf: "-D__ARM_ARCH=7"
      # Sysroot/CC for exotic architectures
      CFLAGS_powerpc64le_unknown_linux_gnu: "--sysroot=/usr/powerpc64le-linux-gnu"
      CC_powerpc64le_unknown_linux_gnu: "powerpc64le-linux-gnu-gcc"
    strategy:
      matrix:
        platform:
          - runner: ubuntu-22.04
            target: x86_64
          - runner: ubuntu-22.04
            target: x86
          - runner: ubuntu-22.04
            target: aarch64
          - runner: ubuntu-22.04
            target: armv7
          - runner: ubuntu-22.04
            target: s390x
          - runner: ubuntu-22.04
            target: ppc64le
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13.11"

      - name: Install cross-toolchains (fallbacks)
        if: contains(fromJSON('["s390x", "ppc64le"]'), matrix.platform.target)
        run: |
          sudo apt-get update
          if [ "${{ matrix.platform.target }}" = "s390x" ]; then
            sudo apt-get install -y gcc-s390x-linux-gnu libc6-dev-s390x-cross
          elif [ "${{ matrix.platform.target }}" = "ppc64le" ]; then
            sudo apt-get install -y gcc-powerpc64le-linux-gnu libc6-dev-ppc64el-cross
          fi

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist --zig --compatibility manylinux_2_34 -i python3.13
          sccache: 'true'

      - name: Test Wheel Import
        if: matrix.platform.target == 'x86_64'
        run: |
          python -m pip install --upgrade pip
          pip install --no-index --find-links dist financeindia
          PYTHONPATH="" python -c "import financeindia; client = financeindia.FinanceClient(); print('Successfully initialized FinanceClient')"

      - name: Upload wheels
        uses: actions/upload-artifact@v6
        with:
          name: wheels-linux-${{ matrix.platform.target }}
          path: dist

  musllinux:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: ubuntu-22.04
            target: x86_64
          - runner: ubuntu-22.04
            target: x86
          - runner: ubuntu-22.04
            target: aarch64
          - runner: ubuntu-22.04
            target: armv7
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        if: matrix.platform.target == 'x86_64'
        with:
          python-version: "3.13.11"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist --zig -i python3.13
          sccache: 'true'
          manylinux: musllinux_1_2

      - name: Test Wheel Import
        if: matrix.platform.target == 'x86_64'
        run: |
          python -m pip install --upgrade pip
          pip install --no-index --find-links dist financeindia
          PYTHONPATH="" python -c "import financeindia; client = financeindia.FinanceClient(); print('Successfully initialized FinanceClient')"

      - name: Upload wheels
        uses: actions/upload-artifact@v6
        with:
          name: wheels-musllinux-${{ matrix.platform.target }}
          path: dist

  windows:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: windows-latest
            target: x64
            python_arch: x64
          - runner: windows-latest
            target: x86
            python_arch: x86
          - runner: windows-11-arm
            target: aarch64
            python_arch: arm64
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13.11"
          architecture: ${{ matrix.platform.python_arch }}

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist -i python3.13
          sccache: 'true'

      - name: Test Wheel Import
        if: matrix.platform.target == 'x64'
        run: |
          python -m pip install --upgrade pip
          pip install --no-index --find-links dist financeindia
          set PYTHONPATH=&& python -c "import financeindia; client = financeindia.FinanceClient(); print('Successfully initialized FinanceClient')"

      - name: Upload wheels
        uses: actions/upload-artifact@v6
        with:
          name: wheels-windows-${{ matrix.platform.target }}
          path: dist

  macos:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: macos-15-intel
            target: x86_64
          - runner: macos-latest
            target: aarch64
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13.11"

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist -i python3.13
          sccache: 'true'

      - name: Test Wheel Import
        run: |
          python -m pip install --upgrade pip
          pip install --no-index --find-links dist financeindia
          PYTHONPATH="" python -c "import financeindia; client = financeindia.FinanceClient(); print('Successfully initialized FinanceClient')"

      - name: Upload wheels
        uses: actions/upload-artifact@v6
        with:
          name: wheels-macos-${{ matrix.platform.target }}
          path: dist

  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - name: Upload sdist
        uses: actions/upload-artifact@v6
        with:
          name: wheels-sdist
          path: dist

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [linux, musllinux, windows, macos, sdist]
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      id-token: write
      contents: write
      attestations: write
    steps:
      - uses: actions/download-artifact@v7
      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: 'wheels-*/*'
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Publish to PyPI
        run: uv publish --check-url https://upload.pypi.org/legacy/ 'wheels-*/*'
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}